services:
  ball_detection_dev:
    build:
      context: .
      dockerfile: dockerfile_cpp
    container_name: ball_detection_ros

    # Mount project as shared volume for development
    volumes:
      - ..:/workspace/ball_detection
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-~/.Xauthority}:/root/.Xauthority:ro

    # Share host's video devices for webcam access
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/root/.Xauthority
      # ROS domain ID (change if needed)
      - ROS_DOMAIN_ID=0

    # Network mode for ROS communication
    network_mode: host

    # Privileged mode for device access (webcam)
    privileged: true

    # Keep container running
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /workspace/ball_detection

    # Default command
    command: /bin/bash
