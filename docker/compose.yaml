services:
  ball_detection_dev:
    build:
      context: .
      dockerfile: dockerfile_cpp
    container_name: ball_detection_ros

    volumes:
      - ..:/workspace/ball_detection
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-~/.Xauthority}:/root/.Xauthority:ro

    # Camera devices - pass through only what exists
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

    # Minimal permissions for camera access (no privileged mode)
    device_cgroup_rules:
      - 'c 81:* rmw'

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/root/.Xauthority
      - ROS_DOMAIN_ID=0

    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/ball_detection
    command: /bin/bash
