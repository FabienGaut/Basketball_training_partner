services:
  ball_detection_dev:
    build:
      context: ..
      dockerfile: docker/dockerfile_cpp
    container_name: ball_detection_ros

    volumes:
      - ..:/workspace/ball_detection
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${XAUTHORITY:-~/.Xauthority}:/root/.Xauthority:ro

    # Camera devices - pass through only what exists
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1

    # Minimal permissions for camera access (no privileged mode)
    device_cgroup_rules:
      - 'c 81:* rmw'

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/root/.Xauthority
      - ROS_DOMAIN_ID=0

    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/ball_detection
    command: /bin/bash

  ball_detection_python:
    build:
      context: ..
      dockerfile: docker/dockerfile_python
    container_name: ball_detection_python

    # Mount project as shared volume for development
    volumes:
      - ..:/workspace/ball_detection

    # Share host's video devices for webcam access
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3

    # Environment variables
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    # Network mode for ROS communication
    network_mode: host

    # Privileged mode for device access (webcam)
    privileged: true

    # Keep container running
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /workspace/ball_detection

    # Default command
    command: /bin/bash
